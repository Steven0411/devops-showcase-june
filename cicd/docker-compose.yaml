version: "3.8"

services:

  app:
    image: yourdockerhub/node-app:latest
    container_name: node-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus